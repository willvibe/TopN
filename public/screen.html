<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopN - 决赛实时大屏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['Share Tech Mono','monospace'] },
      boxShadow: {
        'neon-blue': '0 0 20px rgba(59,130,246,0.45)',
        'neon-gold': '0 0 30px rgba(245,158,11,0.65)',
        'neon-emerald': '0 0 20px rgba(16,185,129,0.5)',
        'neon-purple': '0 0 20px rgba(168,85,247,0.45)',
      }
    }}}
  </script>
  <style>
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.25); border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,0.45); }
    #judges-detail-cards::-webkit-scrollbar, #matrix-table-container::-webkit-scrollbar { height: 0px; }
    .bg-grid { background-size:40px 40px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); }
    .nebula-1 { filter:blur(140px); background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 75%); }
    .nebula-2 { filter:blur(140px); background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 75%); }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .shimmer-bg::after { content:''; position:absolute; top:0;right:0;bottom:0;left:0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent); transform: translateX(-100%); animation: shimmer 3s infinite; }
    @keyframes cell-flash { 0% { background-color: rgba(16,185,129,0.4); box-shadow: 0 0 15px rgba(16,185,129,0.6); } 100% { background-color: transparent; box-shadow: none; } }
    .cell-update { animation: cell-flash 1.2s cubic-bezier(0.1,0.8,0.3,1) forwards; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen overflow-x-hidden relative bg-grid flex flex-col">

  <div class="absolute top-10 left-10 w-[600px] h-[600px] nebula-1 pointer-events-none -z-10"></div>
  <div class="absolute bottom-10 right-10 w-[700px] h-[700px] nebula-2 pointer-events-none -z-10"></div>

  <!-- HEADER -->
  <header class="w-full bg-slate-950/80 border-b border-slate-900/80 backdrop-blur-md px-6 py-4 flex flex-col xl:flex-row items-center justify-between flex-shrink-0 relative z-10 gap-4 min-h-[90px] xl:min-h-[100px]">
    <div class="flex items-center gap-3 xl:w-1/4">
      <div class="flex items-center gap-2 bg-slate-900/60 backdrop-blur-md px-4 py-2 rounded-xl border border-slate-800">
        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></span>
        <span class="text-xs font-mono font-bold tracking-widest text-emerald-400">TOPN SYSTEM LIVE</span>
      </div>
    </div>

    <div class="xl:absolute xl:left-1/2 xl:top-1/2 xl:-translate-x-1/2 xl:-translate-y-1/2 text-center py-2">
      <div class="relative px-10 py-3">
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-cyan-500/80"></div>
        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-cyan-500/80"></div>
        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-cyan-500/80"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-cyan-500/80"></div>
        <h1 id="header-title" class="text-3xl sm:text-4xl lg:text-5xl font-black tracking-[0.08em] bg-gradient-to-r from-white via-cyan-100 via-blue-200 to-slate-400 bg-clip-text text-transparent select-none py-1 leading-tight filter drop-shadow-[0_0_20px_rgba(59,130,246,0.65)] break-words max-w-[120vw] mx-auto" title="">
          决赛实时大屏
        </h1>
      </div>
    </div>

    <div class="flex items-center gap-2.5 justify-end xl:w-1/4 flex-wrap sm:flex-nowrap">
      <button id="btn-next" title="推进到下一位路演选手" class="bg-slate-900/80 hover:bg-slate-800 active:scale-95 text-blue-400 py-2.5 px-3 rounded-xl border border-slate-800 transition flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
      </button>
      <button id="btn-demo" title="30秒模拟全部评委评分过程" class="bg-emerald-600/10 hover:bg-emerald-600/20 active:scale-95 text-emerald-400 border border-emerald-500/30 py-2.5 px-3 rounded-xl transition flex items-center justify-center text-base leading-none">🎬</button>
      <button id="btn-podium" title="展示三甲加冕" class="bg-amber-600/10 hover:bg-amber-600/20 active:scale-95 text-amber-400 border border-amber-500/30 py-2.5 px-3 rounded-xl transition flex items-center justify-center text-base leading-none">👑</button>
      <button id="btn-reset" title="清空全部评分" class="bg-slate-900/80 hover:text-rose-400 active:scale-95 border border-slate-800 text-slate-400 text-xs font-bold py-2.5 px-3 rounded-xl transition">🔄</button>
      <div class="hidden sm:block w-[1px] h-6 bg-slate-800 mx-1"></div>
      <button onclick="toggleFullscreen()" class="p-2.5 rounded-xl bg-slate-900/80 hover:bg-blue-950/40 active:scale-95 border border-slate-800 hover:border-blue-500/50 hover:shadow-neon-blue transition text-slate-400 hover:text-cyan-400" title="全屏">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
      </button>
    </div>
  </header>

  <!-- 空态 -->
  <div id="empty-state" class="hidden flex-grow flex items-center justify-center">
    <div class="text-center text-slate-500"><div class="text-6xl mb-4">🛰️</div><p id="empty-msg" class="text-sm">大屏链接无效或大赛尚未发布</p></div>
  </div>

  <!-- MAIN -->
  <div id="workspace" class="hidden flex flex-col xl:flex-row xl:h-[calc(100vh-100px)] xl:overflow-hidden flex-grow min-h-0 pt-4 sm:pt-6">

    <!-- LEFT: 排行榜 -->
    <div class="w-full xl:w-1/2 flex flex-col p-6 xl:overflow-y-auto border-b xl:border-b-0 xl:border-r border-slate-900 relative justify-between gap-6">
      <div id="active-spotlight" class="relative overflow-hidden bg-gradient-to-r from-slate-900 via-blue-950/40 to-slate-900 border border-blue-500/30 rounded-2xl p-5 shadow-neon-blue flex-shrink-0">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6 py-1">
          <div class="relative flex-shrink-0">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <span id="spotlight-id-tag" class="absolute -bottom-1.5 -right-1.5 bg-slate-950 text-blue-400 border border-slate-800 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold font-mono">#-</span>
          </div>
          <div class="flex-grow min-w-0">
            <h2 id="spotlight-name" class="text-xl sm:text-2xl font-bold text-white tracking-wide truncate">等待开始...</h2>
            <p id="spotlight-team" class="text-slate-400 text-sm mt-1 truncate">—</p>
            <div class="flex flex-wrap items-center gap-2 mt-3">
              <span id="spotlight-cat" class="bg-slate-800 text-slate-300 text-xs px-2.5 py-0.5 rounded-md font-medium border border-slate-700">—</span>
              <span id="spotlight-desc" class="text-xs text-slate-500 truncate">—</span>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-grow flex flex-col min-h-0">
        <div class="flex justify-between items-center mb-4 flex-shrink-0">
          <h3 class="text-lg font-bold text-white tracking-wide select-none">实时排位能量柱状图 (Live Molecular Chart)</h3>
          <span class="text-xs text-slate-500 font-mono select-none hidden sm:inline">毫秒级位置交织动画</span>
        </div>
        <div id="leaderboard-container" class="relative w-full flex-grow min-h-[460px] bg-slate-950/40 rounded-2xl p-1 border border-slate-900 overflow-hidden"></div>
      </div>
    </div>

    <!-- RIGHT: 评委明细 + 矩阵 -->
    <div class="w-full xl:w-1/2 flex flex-col p-6 bg-slate-900/10 xl:overflow-y-auto relative gap-6 justify-between">
      <div class="space-y-3 flex-shrink-0">
        <div class="flex justify-between items-center flex-shrink-0">
          <h3 class="text-lg font-bold text-white tracking-wide select-none">当前路演选手 · 评委评分明细</h3>
          <span id="active-spotlight-sub-progress" class="text-xs text-emerald-400 font-mono">0 / 0 提交</span>
        </div>
        <div class="flex overflow-x-auto pb-2 gap-2.5 w-full select-none" id="judges-detail-cards"></div>
      </div>

      <div class="space-y-3 flex-grow flex flex-col min-h-0">
        <div class="flex justify-between items-center flex-shrink-0">
          <h3 class="text-lg font-bold text-white tracking-wide select-none">决赛全场实时排名矩阵</h3>
          <span class="text-xs text-slate-500 font-mono select-none">红色标出剔除极值</span>
        </div>
        <div id="matrix-table-container" class="border border-slate-900 bg-slate-950/60 rounded-xl overflow-hidden shadow-lg flex-grow overflow-x-auto relative">
          <table class="w-full text-left border-collapse text-xs">
            <thead>
              <tr class="bg-slate-900/70 border-b border-slate-800/80 text-slate-400 font-mono text-[10px] uppercase select-none" id="matrix-thead-row"></tr>
            </thead>
            <tbody id="matrix-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="mt-4 bg-slate-900/40 border border-slate-900 rounded-xl p-3 flex justify-between items-center text-xs text-slate-400 flex-shrink-0 relative z-20">
        <div class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span><span id="toast-message" class="transition-all duration-300">系统就绪，等待评委评分数据上传...</span></div>
        <div id="sys-time-display" class="font-mono text-[10px] text-slate-500 select-none">SYS TIME: --</div>
      </div>
    </div>
  </div>

  <!-- Podium Overlay -->
  <div id="podium-overlay" class="hidden fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center p-6 transition-all duration-500 overflow-y-auto">
    <canvas id="fireworks-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
    <div class="absolute inset-0 bg-grid opacity-20 pointer-events-none"></div>
    <div class="absolute top-20 w-[450px] h-[450px] bg-amber-500/10 blur-[130px] pointer-events-none animate-pulse"></div>
    <div class="absolute bottom-20 w-[450px] h-[450px] bg-purple-500/10 blur-[130px] pointer-events-none animate-pulse"></div>
    <!-- 大赛标题: 浮于顶部, 单独上移, 不影响柱子居中 -->
    <div class="absolute top-8 sm:top-12 left-0 right-0 text-center px-6 z-10">
      <span class="text-xs uppercase tracking-widest font-semibold text-amber-500 font-mono animate-bounce">GRAND FINALE WINNERS</span>
      <h2 id="podium-title" class="text-2xl sm:text-4xl lg:text-5xl font-black tracking-tight mt-2 leading-tight bg-gradient-to-r from-amber-400 via-amber-100 to-amber-500 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(245,158,11,0.3)] break-words max-w-[120vw] mx-auto">🏆 加冕荣誉殿堂 🏆</h2>
    </div>
    <!-- 三甲柱子组: 保持垂直居中 -->
    <div class="text-center max-w-4xl w-full relative z-10 flex flex-col items-center mt-16">
      <p class="text-sm text-slate-400 mb-8 select-none">历经路演角逐与评委加权甄选，决赛大奖正式揭晓</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-end w-full px-4 overflow-visible" id="podium-cards-container"></div>
      <button onclick="closePodiumOverlay()" class="mt-10 px-8 py-3 rounded-xl bg-gradient-to-r from-amber-500 via-amber-400 to-amber-500 text-slate-950 font-extrabold shadow-neon-gold hover:scale-105 active:scale-95 transition text-sm">✨ 确认并退回赛控</button>
    </div>
  </div>

  <script>
    // ============ GSAP 兜底 ============
    if (typeof gsap === 'undefined') {
      window.gsap = {
        to(t,v){
          const isObj = typeof t==='object' && !t.nodeType && !t.length;
          if(isObj){const sv={};for(const k in v){if(typeof t[k]==='number')sv[k]=t[k];}const dur=(v.duration||1)*1000,st=Date.now(),iv=setInterval(()=>{const p=Math.min((Date.now()-st)/dur,1),e=Math.sin(p*Math.PI/2);for(const k in sv)t[k]=sv[k]+(v[k]-sv[k])*e;if(v.onUpdate)v.onUpdate();if(p>=1){clearInterval(iv);if(v.onComplete)v.onComplete();}},16);return;}
          const els=typeof t==='string'?document.querySelectorAll(t):(t&&t.length?t:[t]);(els||[]).forEach&&els.forEach(el=>{if(!el||!el.style)return;el.style.transition=`all ${v.duration||0.5}s cubic-bezier(0.16,1,0.3,1)`;if(v.top!==undefined)el.style.top=typeof v.top==='number'?`${v.top}px`:v.top;if(v.scale!==undefined)el.style.transform=`scale(${v.scale})`;if(v.onComplete)setTimeout(v.onComplete,(v.duration||0.5)*1000);});
        },
        fromTo(t,f,v){const els=typeof t==='string'?document.querySelectorAll(t):(t&&t.length?t:[t]);(els||[]).forEach&&els.forEach(el=>{if(!el||!el.style)return;el.style.transition="none";if(f.scale!==undefined)el.style.transform=`scale(${f.scale})`;el.offsetHeight;el.style.transition=`all ${v.duration||0.6}s cubic-bezier(0.16,1,0.3,1)`;if(v.scale!==undefined)el.style.transform=`scale(${v.scale})`;if(v.onComplete)setTimeout(v.onComplete,(v.duration||0.6)*1000);});}
      };
    }
    if (typeof confetti === 'undefined') { window.confetti = function(){}; }

    // ============ 状态 ============
    const SCREEN_TOKEN = location.pathname.split('/').pop();
    const CARD_HEIGHT = 68;
    let CARD_GAP = 12;
    let snap = null;            // 最新快照
    let compId = null;
    let prevRankMap = {};       // {workId: prevRank} 用于检测名次变化
    let prevCellScores = {};    // {workId|judgeId: score} 用于检测单元格更新

    // ============ 启动 ============
    window.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('btn-next').addEventListener('click', advanceNext);
      document.getElementById('btn-demo').addEventListener('click', runDemoSimulation);
      document.getElementById('btn-reset').addEventListener('click', resetScores);
      document.getElementById('btn-podium').addEventListener('click', triggerPodium);
      startClock();

      // 拉取初始数据
      const res = await fetch(`/api/screen/${SCREEN_TOKEN}`).then(r => r.json()).catch(() => null);
      if (!res || !res.ok) {
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }
      // 先同步大赛名称 (即使布局未就绪也能显示)
      setHeaderTitle(res.data.competition.name, res.data.competition.name_subtitle);
      document.getElementById('workspace').classList.remove('hidden');
      compId = res.data.competition.id;
      // 等待浏览器完成布局后再渲染 (从 display:none 切出后 clientHeight 才有效)
      requestAnimationFrame(() => {
        applySnapshot(res.data, false);
        // 初始渲染完成后启动匀速滚动引擎 (与后续评分刷新解耦, 持续运行)
        startJudgeScroll();
        startMatrixScroll();
      });

      // 建立 SSE
      connectSSE();
    });

    function connectSSE() {
      const es = new EventSource(`/api/screen/${SCREEN_TOKEN}/stream`);
      es.onmessage = (ev) => {
        try {
          const payload = JSON.parse(ev.data);
          if (payload.type === 'snapshot') applySnapshot(payload.snapshot, true);
        } catch (e) {}
      };
      es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); }; // 断线重连
    }

    // ============ 应用快照 ============
    function applySnapshot(data, animate) {
      const firstLoad = snap === null;
      snap = data;
      setHeaderTitle(data.competition.name, data.competition.name_subtitle);
      // 前三甲标题: 主标题 + 副标题分两行 (均需自带渐变 bg-clip-text, 否则继承 text-transparent 不可见)
      const sub = (data.competition.name_subtitle || '').trim();
      const podiumEl = document.getElementById('podium-title');
      if (sub) {
        podiumEl.innerHTML = `<div class="bg-gradient-to-r from-amber-400 via-amber-100 to-amber-500 bg-clip-text text-transparent">🏆 ${escapeHtml(data.competition.name)} 🏆</div><div class="text-lg sm:text-2xl lg:text-3xl mt-1 opacity-80 bg-gradient-to-r from-amber-200 to-amber-400 bg-clip-text text-transparent">${escapeHtml(sub)}</div>`;
      } else {
        podiumEl.innerText = `🏆 ${data.competition.name} 🏆`;
      }

      initializeLeaderboardDOM();
      recalculateAndAnimate(animate && !firstLoad);
      updateActiveSpotlight();
      renderJudgesCards();
      renderMatrixTable();
    }

    // 创建排行榜 DOM（仅在卡片数量变化时重建）
    let leaderboardBuilt = false;
    function initializeLeaderboardDOM() {
      const container = document.getElementById('leaderboard-container');
      const works = snap.works;
      const existing = container.querySelectorAll('[data-id]');
      if (existing.length === works.length && leaderboardBuilt) return;
      container.innerHTML = '';
      works.forEach(w => {
        const card = document.createElement('div');
        card.id = `card-${w.id}`;
        card.setAttribute('data-id', w.id);
        card.className = `absolute left-2 right-2 rounded-xl border border-slate-900 bg-slate-900/60 backdrop-blur-sm py-2 px-4 flex items-center justify-between transition-all duration-300 shimmer-bg cursor-pointer overflow-hidden`;
        card.style.height = `${CARD_HEIGHT}px`;
        card.innerHTML = `
          <div class="flex items-center w-full min-w-0">
            <div class="rank-badge w-8 h-8 rounded-full flex items-center justify-center font-mono font-black text-sm relative flex-shrink-0 transition-all duration-300"><span class="rank-num font-bold">--</span></div>
            <div class="flex-grow mx-4 min-w-0">
              <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-1.5 min-w-0">
                  <span class="active-pulse-dot hidden w-2 h-2 bg-blue-500 rounded-full animate-pulse flex-shrink-0 shadow-[0_0_8px_#3b82f6]"></span>
                  <h4 class="font-bold text-slate-100 text-sm truncate tracking-wide">${escapeHtml(w.name)}</h4>
                </div>
                <span class="text-[10px] text-slate-500 font-mono truncate hidden sm:inline-block">${escapeHtml(w.team||'')} · ${escapeHtml(w.category||'')}</span>
              </div>
              <div class="relative w-full h-3 bg-slate-950/80 rounded-full border border-slate-900 overflow-visible">
                <div class="score-progress-bar h-full bg-gradient-to-r from-blue-600 via-indigo-500 to-cyan-400 rounded-full transition-all duration-500" style="width: 0%"></div>
                <div class="score-tip-node absolute top-1/2 -translate-y-1/2 -ml-2 w-4 h-4 rounded-full bg-cyan-300 shadow-[0_0_12px_#22d3ee] border border-white transition-all duration-500" style="left: 0%"></div>
              </div>
            </div>
            <div class="text-right flex items-center gap-1.5 flex-shrink-0">
              <div class="score-container font-mono text-xl font-extrabold text-blue-400 leading-none min-w-[65px]">${w.final.toFixed(2)}</div>
              <div class="text-xs select-none relative trend-indicator w-4 h-4 flex items-center justify-center rounded"><span class="trend-icon">-</span></div>
            </div>
          </div>`;
        container.appendChild(card);
      });
      leaderboardBuilt = true;
    }

    function recalculateAndAnimate(animate) {
      const works = snap.works; // 已按 final desc 排序
      const container = document.getElementById('leaderboard-container');
      // clientHeight 在容器刚从 hidden 切出时可能为 0, 用合理兜底避免卡片堆叠成空白
      let containerHeight = container ? container.clientHeight : 0;
      if (!containerHeight) containerHeight = Math.max(472, works.length * (CARD_HEIGHT + 14) + 16);
      const total = works.length;
      const available = containerHeight - (total * CARD_HEIGHT);
      CARD_GAP = total > 1 ? Math.min(18, Math.max(12, (available - 8) / (total - 1))) : 12;
      const totalListHeight = (total * CARD_HEIGHT) + ((total - 1) * CARD_GAP);
      const offsetTop = Math.max(4, (containerHeight - totalListHeight) / 2);

      works.forEach((w, idx) => {
        const card = document.getElementById(`card-${w.id}`);
        if (!card) return;
        const targetTop = offsetTop + idx * (CARD_HEIGHT + CARD_GAP);
        const prevIdx = prevRankMap[w.id] !== undefined ? prevRankMap[w.id] : idx;
        const rankChange = prevIdx - idx;

        const badge = card.querySelector('.rank-badge');
        const badgeNum = card.querySelector('.rank-num');

    // ============ 评委评分明细 · 匀速从左到右滚动引擎 ============
    // 引擎独立于内容更新: 只启动一次, 评分刷新时只 diff 更新卡片内容, 不打断滚动
    let judgeScrollRAF = null;
    let judgeScrollPaused = false;
    let judgeScrollStarted = false;
    function startJudgeScroll() {
      const container = document.getElementById('judges-detail-cards');
      if (!container) return;
      // 已启动则不重复启动 (评分刷新不会重启引擎)
      if (judgeScrollStarted) return;
      judgeScrollStarted = true;
      // 鼠标悬停暂停 / 移开恢复
      container.onmouseenter = () => { judgeScrollPaused = true; };
      container.onmouseleave = () => { judgeScrollPaused = false; };
      // 仅首次启动时从最左开始
      container.scrollLeft = 0;
      const SPEED = 0.5; // px/帧, 匀速 (约 30px/s @60fps)

      // 只在内容溢出(需要滚动)时才滚动; 否则静态居中
      const needsScroll = () => container.scrollWidth > container.clientWidth + 2;

      const tick = () => {
        judgeScrollRAF = requestAnimationFrame(tick);
        if (judgeScrollPaused || !needsScroll()) return;
        container.scrollLeft += SPEED;
        // 无缝循环: 滚过第一组(原始卡片)宽度后, 瞬间回到起点
        const half = container.scrollWidth / 2;
        if (container.scrollLeft >= half) {
          container.scrollLeft -= half;
        }
      };
      // 容器布局: 滚动时左对齐, 不滚动时均匀分布
      container.style.justifyContent = needsScroll() ? 'flex-start' : 'space-between';
      tick();
    }

    // ============ 操作 ============
    // ============ 演示模拟: 30秒内逐步完成全部评委评分 ============
    let demoRunning = false;
    async function runDemoSimulation() {
      if (demoRunning || !snap || !compId) return;
      const btn = document.getElementById('btn-demo');
      const judges = snap.judges || [];
      const works = snap.works || [];
      const standards = snap.standards || [];
      if (!judges.length || !works.length || !standards.length) {
        pushToast('⚠️ 缺少评委/作品/标准数据，无法演示');
        return;
      }

      demoRunning = true;
      btn.disabled = true;
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '🎬 演示中…';
      btn.classList.add('opacity-60', 'cursor-not-allowed');

      // 1) 清空所有评分 (SSE 会推送空快照, 大屏归零)
      await fetch(`/api/competitions/${compId}/reset-scores`, { method: 'POST' });
      await sleep(600);

      // 2) 为每个作品预设"实力系数"(0.72~0.98), 让排名有规律
      //    每次演示随机打乱, 保证视觉新鲜感
      const powerMap = {};
      const shuffledWorks = [...works].map(w => ({ id: w.id, power: 0.72 + Math.random() * 0.26 }));
      shuffledWorks.forEach(w => { powerMap[w.id] = w.power; });

      // 3) 构建评分任务队列: 所有 (评委, 作品) 组合, 打乱顺序
      const tasks = [];
      for (const j of judges) {
        for (const w of works) {
          // 该评委对该作品各维度的分数 = 作品实力 × 10 ± 扰动, clamp 6.0~9.8
          const scores = {};
          for (const s of standards) {
            let val = powerMap[w.id] * 10 + (Math.random() - 0.5) * 1.6;
            val = Math.round(Math.max(6.0, Math.min(9.8, val)) * 10) / 10;
            scores[s.id] = val;
          }
          tasks.push({ judgeId: j.id, workId: w.id, scores });
        }
      }
      // 打乱提交顺序, 让分数逐步涌现而非按顺序
      for (let i = tasks.length - 1; i > 0; i--) {
        const k = Math.floor(Math.random() * (i + 1));
        [tasks[i], tasks[k]] = [tasks[k], tasks[i]];
      }

      // 4) 30秒内逐步提交, 每次提交触发 SSE → 大屏实时刷新
      const DURATION = 30000;
      const interval = Math.max(250, DURATION / tasks.length);
      pushToast(`🎬 开始演示：${tasks.length} 个评分将在 30 秒内逐步完成`);

      for (let i = 0; i < tasks.length; i++) {
        const t = tasks[i];
        // 评分提交 (忽略错误, 即使个别失败也不中断演示)
        fetch(`/api/judge/${t.judgeId}/score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ work_id: t.workId, scores: t.scores })
        }).catch(() => {});
        await sleep(interval);
      }

      // 5) 完成, 恢复按钮
      demoRunning = false;
      btn.disabled = false;
      btn.innerHTML = originalHtml;
      btn.classList.remove('opacity-60', 'cursor-not-allowed');
      pushToast('🎉 演示评分完成，可查看最终排名与三甲加冕');
    }

    // ============ 烟花引擎 ============
    let fireworksActive = false, fireworksAnimFrame = null;
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let fireworks = [], particles = [];
    class Firework { constructor(sx,sy,tx,ty){this.x=sx;this.y=sy;this.sx=sx;this.sy=sy;this.tx=tx;this.ty=ty;this.distanceToTarget=Math.sqrt((tx-sx)**2+(ty-sy)**2);this.distanceTraveled=0;this.coordinates=[];let c=3;while(c--)this.coordinates.push([this.x,this.y]);this.angle=Math.atan2(ty-sy,tx-sx);this.speed=1.75;this.acceleration=1.035;this.brightness=Math.random()*30+50;this.hue=Math.random()*360;} update(i){this.coordinates.pop();this.coordinates.unshift([this.x,this.y]);this.speed*=this.acceleration;let vx=Math.cos(this.angle)*this.speed,vy=Math.sin(this.angle)*this.speed;this.distanceTraveled=Math.sqrt((this.sx-(this.x+vx))**2+(this.sy-(this.y+vy))**2);if(this.distanceTraveled>=this.distanceToTarget){createExplosion(this.tx,this.ty,this.hue);fireworks.splice(i,1);}else{this.x+=vx;this.y+=vy;}} draw(){ctx.beginPath();ctx.moveTo(this.coordinates[this.coordinates.length-1][0],this.coordinates[this.coordinates.length-1][1]);ctx.lineTo(this.x,this.y);ctx.strokeStyle=`hsla(${this.hue},100%,${this.brightness}%,0.8)`;ctx.lineWidth=2.5;ctx.stroke();} }
    class Particle { constructor(x,y,hue){this.x=x;this.y=y;this.coordinates=[];let c=5;while(c--)this.coordinates.push([this.x,this.y]);this.angle=Math.random()*Math.PI*2;this.speed=Math.random()*5.6+1.4;this.friction=0.96;this.gravity=0.84;this.hue=Math.random()*30+hue;this.brightness=Math.random()*20+60;this.alpha=1;this.decay=Math.random()*0.014+0.0105;} update(i){this.coordinates.pop();this.coordinates.unshift([this.x,this.y]);this.speed*=this.friction;this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed+this.gravity;this.alpha-=this.decay;if(this.alpha<=this.decay)particles.splice(i,1);} draw(){ctx.beginPath();ctx.moveTo(this.coordinates[this.coordinates.length-1][0],this.coordinates[this.coordinates.length-1][1]);ctx.lineTo(this.x,this.y);ctx.strokeStyle=`hsla(${this.hue},100%,${this.brightness}%,${this.alpha})`;ctx.lineWidth=1.8;ctx.stroke();} }
    function createExplosion(x,y,hue){let c=120;while(c--)particles.push(new Particle(x,y,hue));}
    function initFireworks(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;fireworksActive=true;fireworks=[];particles=[];loopFireworks();}
    function loopFireworks(){if(!fireworksActive)return;fireworksAnimFrame=requestAnimationFrame(loopFireworks);ctx.globalCompositeOperation='destination-out';ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalCompositeOperation='lighter';let i=fireworks.length;while(i--){fireworks[i].draw();fireworks[i].update(i);}let j=particles.length;while(j--){particles[j].draw();particles[j].update(j);}if(Math.random()<0.25){fireworks.push(new Firework(Math.random()*canvas.width,canvas.height,Math.random()*canvas.width,Math.random()*(canvas.height*0.55)));}}
    function stopFireworks(){fireworksActive=false;if(fireworksAnimFrame)cancelAnimationFrame(fireworksAnimFrame);ctx.clearRect(0,0,canvas.width,canvas.height);}

    // ============ 工具 ============
    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().then(()=>pushToast('🖥️ 已进入全屏'));
      else document.exitFullscreen();
    }

    function startClock() {
      const upd = () => {
        const el = document.getElementById('sys-time-display');
        if (!el) return;
        const n = new Date();
        const p = x => String(x).padStart(2,'0');
        el.innerText = `SYS TIME: ${n.getFullYear()}.${p(n.getMonth()+1)}.${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
      };
      setInterval(upd, 1000); upd();
    }

    function playSound(type){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const ctx=new A();const osc=ctx.createOscillator();const g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);if(type==='success'){osc.frequency.setValueAtTime(523.25,ctx.currentTime);osc.frequency.setValueAtTime(659.25,ctx.currentTime+0.1);g.gain.setValueAtTime(0.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.3);osc.start();osc.stop(ctx.currentTime+0.3);}else if(type==='swap'){osc.frequency.setValueAtTime(140,ctx.currentTime);osc.frequency.setValueAtTime(420,ctx.currentTime+0.25);g.gain.setValueAtTime(0.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.25);osc.start();osc.stop(ctx.currentTime+0.25);}}catch(e){}}

    function pushToast(m){const el=document.getElementById('toast-message');if(!el)return;el.innerText=m;el.classList.remove('text-slate-400');el.classList.add('text-indigo-400');setTimeout(()=>{el.classList.remove('text-indigo-400');el.classList.add('text-slate-400');},2500);}

    function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    // 大赛名称: 分两行显示, 主标题(第一行)略大, 副标题(第二行)略小, 均水平居中
    function setHeaderTitle(name, subtitle) {
      const el = document.getElementById('header-title');
      if (!el) return;
      const sub = (subtitle || '').trim();
      if (sub) {
        // 副标题需自带 bg-clip-text 渐变, 否则继承 h1 的 text-transparent 会不可见
        el.innerHTML = `<div class="leading-tight bg-gradient-to-r from-white via-cyan-100 via-blue-200 to-slate-400 bg-clip-text text-transparent">${escapeHtml(name)}</div><div class="text-xl sm:text-2xl lg:text-3xl font-bold opacity-80 leading-tight mt-1 bg-gradient-to-r from-cyan-200 via-blue-200 to-slate-400 bg-clip-text text-transparent">${escapeHtml(sub)}</div>`;
      } else {
        el.innerText = name;
      }
      el.setAttribute('title', name + (sub ? ' · ' + sub : ''));
    }

    // 等级标签 (用于表头/卡片)
    function levelTag(level) {
      const map = {
        expert: { t: '专家×1.5', c: 'text-amber-400' },
        senior: { t: '资深×1.2', c: 'text-indigo-400' },
        normal: { t: '普通×1.0', c: 'text-slate-500' },
      };
      const m = map[level] || map.normal;
      return `<span class="text-[8px] font-mono ${m.c}">${m.t}</span>`;
    }
  </script>
</body>
